apiVersion: opendatacontractstandard.org/v3
kind: DataContract

metadata:
  id: dvsa-fleet-audit
  name: DVSA Fleet Audit
  version: 1.0.0
  status: active
  domain: dvsa
  tenant: dft-av
  owner:
    name: DVSA Operator Compliance Data Product Owner
    email: data.governance@dvsa.gov.uk
  description: >
    Daily DVSA fleet audit CSV landed via an S3 Shortcut into the AV-Ingest
    Bronze lakehouse. One row per NUiCO operator giving fleet size,
    inspections passed in the audit period, recall exposure flag, and
    operating status. Underpins an internal scenario
    (DQ-CONS-RECALL-01) and feeds silver_fleet_audit_join, dim_party and
    the Licensing release product. Bound to internal-dt-ref in the DfT service-design
    data-asset register.

schema:
  type: delta
  location:
    layer: bronze
    workspace: AV-Ingest-{env}
    lakehouse: lh_av_bronze
    table: bronze_dvsa_fleet_audit
  columns:
    - name: nuico_name
      type: string
      nullable: false
      pii: PII.Party.LegalName
      description: >
        Registered legal name of the NUiCO (Numbered User in Charge of
        Operations) — the licensed AV operator under the AV Act. Source CSV
        header "NUiCO Name".
    - name: licence_reference
      type: string
      nullable: false
      format: '^NUICO-DVSA-\d{4}-\d{3}$'
      description: >
        DVSA-issued NUiCO operator licence reference. Primary natural key
        for an operator across DVSA, NUiCO and Licensing release. Source CSV
        header "Licence Reference".
    - name: fleet_size
      type: integer
      nullable: false
      description: >
        Count of vehicles operating under this NUiCO at audit time.
        Range 0..10000. Source CSV header "Fleet Size".
    - name: inspections_passed
      type: integer
      nullable: false
      description: >
        Count of vehicles in the fleet that passed inspection in the audit
        period. Must be <= fleet_size (enforced by DQ-CONS-FLEET-AUDIT-01).
        Source CSV header "Inspections Passed".
    - name: recall_exposure
      type: string
      nullable: false
      enum: ["None", "Yes", "Yes (resolved)"]
      description: >
        Whether any vehicle in this fleet is in scope of an active VCA
        recall against its model. Flag-only summary; the join to VCA recall
        is performed in Silver. Source CSV header "Recall Exposure".
    - name: status
      type: string
      nullable: false
      enum: ["ACTIVE", "SUSPENDED", "REVOKED"]
      description: >
        Operator status at audit time. Source CSV header "Status".
    - name: _ingested_at_utc
      type: timestamp
      nullable: false
      description: Audit column — when the row landed in Bronze.
    - name: _source_file
      type: string
      nullable: true
      description: >
        Audit column — source CSV path
        (e.g. s3://dvsa-data-exchange/fleet-audit/DVSA-FLEET-AUDIT-2025-001_fleet_data.csv).
    - name: _correlation_id
      type: string
      nullable: false
      description: Audit column — end-to-end ingestion correlation id.
    - name: _dq_status
      type: string
      nullable: false
      enum: ["PASS", "QUARANTINE", "RECOVERED"]
      description: Audit column — DQ engine verdict.

semantics:
  - term: NUiCO
    definition: >
      Numbered User in Charge of Operations — the licensed AV operator under
      the AV Act. Each NUiCO holds exactly one DVSA-issued licence reference.
    relatedTerms: [operator_licence, party, licence_reference]
  - term: Recall Exposure
    definition: >
      Boolean (tri-state) flag indicating whether any vehicle in the
      operator's fleet is in scope of an active VCA recall against its
      model. "Yes (resolved)" means recall existed but all affected
      vehicles have been remediated.
    relatedTerms: [VCA-REC, recall, vehicle_model]
  - term: Fleet Audit Observation
    definition: >
      One DVSA-observed snapshot of a NUiCO's fleet compliance at a point
      in time. Grain: (licence_reference, audit_date) — current
      contract carries the latest snapshot only.
    relatedTerms: [fleet_size, inspections_passed]

sla:
  freshness:
    expected: PT26H
    rule: DQ-FRESH-DVSA-01
  availability:
    target: 99.5%

quality:
  rules:
    - id: DQ-FORMAT-NUICO-DVSA-01
      dimension: format
      scope: column
      column: licence_reference
      expression: 'rlike("^NUICO-DVSA-\\d{4}-\\d{3}$")'
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-CMPL-LIC-REF-01
      dimension: completeness
      scope: column
      column: licence_reference
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-CMPL-NUICO-NAME-01
      dimension: completeness
      scope: column
      column: nuico_name
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-CMPL-FLEET-SIZE-01
      dimension: completeness
      scope: column
      column: fleet_size
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-CONF-RECALL-EXPOSURE-01
      dimension: conformity
      scope: column
      column: recall_exposure
      expression: "recall_exposure IN ('None','Yes','Yes (resolved)')"
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-CONF-STATUS-01
      dimension: conformity
      scope: column
      column: status
      expression: "status IN ('ACTIVE','SUSPENDED','REVOKED')"
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-CONS-FLEET-AUDIT-01
      dimension: consistency
      scope: cross-table
      expression: "inspections_passed <= fleet_size"
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-CONS-RECALL-01
      dimension: consistency
      scope: cross-table
      expression: >
        recall_exposure NOT IN ('Yes') OR EXISTS (
          SELECT 1 FROM silver_recall r
          WHERE r.model_code IN (
            SELECT model_code FROM silver_vehicle v
            WHERE v.nuico_licence_ref = licence_reference
          )
          AND r.recall_issued_at_utc <= current_timestamp()
        )
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-FRESH-DVSA-01
      dimension: freshness
      scope: table
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-VOL-DVSA-FLEET-01
      dimension: volume
      scope: table
      threshold: 100
      blocksRelease: false
      severity: major
      owner: dvsa-domain-steward
    - id: DQ-UNIQ-LIC-REF-01
      dimension: uniqueness
      scope: table
      column: licence_reference
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-CMPL-OVERALL-01
      dimension: completeness
      scope: table
      expression: "row-level completeness >= 99"
      threshold: 99
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward

termsOfUse:
  classification: OFFICIAL-SENSITIVE
  retention:
    period: P7Y
    deleteOn: expiry
  permittedUses:
    - statutory regulatory oversight by DVSA, CCAV and VCA
    - cross-regulator recall exposure detection (hero scenario an internal scenario)
    - DQ gate evaluation
    - Licensing cross-check release product
  prohibitedUses:
    - commercial profiling of operators
    - PII enrichment outside DfT consent envelope
    - publication of identifiable operator-level fleet figures to the public
      stats lane

access:
  rolesPermitted:
    - data-engineer (read+write on bronze)
    - data-analyst (read on silver+gold)
    - dvsa-domain-steward (read on bronze+silver+gold)
    - licensing-consumer (read on release_licensing)
  rolesProhibited:
    - everyone-else
    - police-consumer
    - insurer-consumer
    - publicstats-consumer

endorsement:
  level: Certified
  certifiedBy: DVSA Data Product Owner
  certifiedAt: 2026-05-19

lineage:
  upstream:
    - kind: external
      system: DVSA Data Exchange (S3)
      object: s3://dvsa-data-exchange/fleet-audit/DVSA-FLEET-AUDIT-*_fleet_data.csv
  downstream:
    - kind: workspace_item
      workspace: AV-Medallion-{env}
      item: lh_av_silver.silver_fleet_audit_join
    - kind: workspace_item
      workspace: AV-Medallion-{env}
      item: lh_av_gold.dim_party
    - kind: workspace_item
      workspace: AV-Medallion-{env}
      item: lh_av_gold.dim_nuico
    - kind: workspace_item
      workspace: AV-Release-Licensing-{env}
      item: release_licensing_cross_check

history:
  - version: 1.0.0
    date: 2026-05-19
    change: Initial contract derived from DVSA-FLEET-AUDIT-2025-001_fleet_data.csv sample.
    author: internal data lineage
    breaking: false
    approvers:
      - DVSA Operator Compliance Data Product Owner
      - Licensing release Data Product Owner

customProperties:
  dft-av.owner-agency: DVSA
  dft-av.dt-reference: internal-dt-ref
  dft-av.hero-scenarios:
    - internal-scenario-1
    - internal-scenario-2
  dft-av.pii-present: true
  dft-av.zone-of-trust: internal
  dft-av.volume.rows-per-day-expected: 6
  dft-av.volume.rows-per-day-tolerance-low-pct: 50
  dft-av.volume.rows-per-day-tolerance-high-pct: 200
  dft-av.latency.end-to-end: PT4H
  dft-av.source-csv-headers:
    - "NUiCO Name"
    - "Licence Reference"
    - "Fleet Size"
    - "Inspections Passed"
    - "Recall Exposure"
    - "Status"
  dft-av.source-csv-sample: "[EXTERNAL] AV Data/AV_Act_All_Documents_Service_Design/DVSA-FLEET-AUDIT-2025-001_fleet_data.csv"
