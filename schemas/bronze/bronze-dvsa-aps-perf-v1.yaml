apiVersion: opendatacontractstandard.org/v3
kind: DataContract

metadata:
  id: bronze-dvsa-aps-perf
  name: Bronze DVSA APS Route Performance
  version: 1.0.0
  status: draft
  domain: dvsa
  tenant: dft-av
  owner:
    name: DVSA Automated Passenger Service Performance Data Product Owner
    email: data.governance@dvsa.gov.uk
  description: >
    Bronze landing of the monthly DVSA APS (Automated Passenger Service)
    route-level performance return submitted by each NUiCO. One row per
    (route_ref, period_month) carrying journeys, on-time percentage, ADS
    interventions per 1000 km and passenger satisfaction. Source is the
    operator-facing AV-Ingest portal (Lane 5 — portal upload). Feeds
    silver_aps_perf, dim_aps_route and the M2 service-quality dashboard.
    Bound to internal-dt-ref in the DfT service-design data-asset register.

schema:
  type: delta
  location:
    layer: bronze
    workspace: AV-Medallion-{env}
    lakehouse: lh_av_bronze
    table: bronze_dvsa_aps_perf
  columns:
    - name: route_ref
      type: string
      nullable: false
      format: '^[A-Z]{2}-\d{3}$'
      description: >
        APS route natural key (e.g. "FR-001"). 2-letter operator prefix
        + sequence. FK to dim_permits.routes once Silver joins on the
        semicolon-split list. Source CSV header "Route Ref".
    - name: route_description
      type: string
      nullable: false
      description: >
        Human-readable route description, typically "<Origin> to
        <Destination>". Source CSV header "Route Description".
    - name: journeys
      type: integer
      nullable: false
      description: >
        Count of completed passenger journeys on the route in the
        reporting month. Realistic range 3,000–6,000 per synth-rules
        table 4. Source CSV header "Journeys".
    - name: on_time_pct
      type: decimal(3,1)
      nullable: false
      description: >
        Share of journeys arriving within the DVSA-defined on-time
        window. Range 88.0–99.0. Source CSV header "On-Time Pct".
    - name: ads_interventions_per_1000km
      type: decimal(4,1)
      nullable: false
      description: >
        Number of ADS hand-back / safety driver intervention events per
        1000 km of journey distance. Range 5.0–60.0. Lower is better.
        Source CSV header "ADS Interventions per 1000km".
    - name: passenger_satisfaction
      type: decimal(2,1)
      nullable: false
      description: >
        Mean passenger satisfaction score on a 1.0–5.0 scale. Realistic
        range 3.0–5.0. Source CSV header "Passenger Satisfaction".
    - name: _ingested_at_utc
      type: timestamp
      nullable: false
      description: Audit column — UTC timestamp when the row landed in Bronze.
    - name: _source_file
      type: string
      nullable: true
      description: Audit column — source CSV filename or URI.
    - name: _correlation_id
      type: string
      nullable: false
      description: Audit column — UUID linking the row to the upload batch.
    - name: _dq_status
      type: string
      nullable: false
      enum: ["PASS","QUARANTINE","FAIL"]
      description: Audit column — DQ Gate verdict set by internal data lineage.
    - name: _source_lane
      type: string
      nullable: false
      enum: ["shortcut","mirroring","pipeline","push","portal","eventstream","openmirroring"]
      description: Audit column — internal ingest lane that delivered this row.
    - name: _raw_blob_path
      type: string
      nullable: false
      description: >
        Audit column — full ABFSS / S3 / queue URI of the raw payload as
        it landed in the source landing zone. Used for forensic replay
        and Purview lineage back to the raw blob. Supersedes the older
        _source_file audit column (kept for backward compatibility with
        ADR-002 v1 consumers); new ingest notebooks MUST set both to the
        same value when the source is file-shaped.
    - name: _contract_version
      type: string
      nullable: false
      format: '^\d+\.\d+\.\d+$'
      description: >
        Audit column — semver of the Bronze ODCS contract under which
        this row was written (matches metadata.version). Lets Silver and
        the DQ Gate detect contract drift without re-reading the YAML.

semantics:
  - term: APS Route
    definition: >
      A defined point-to-point automated passenger service corridor
      operated by a NUiCO under an APS permit. Identified by an
      operator-prefixed code.
    relatedTerms: [permit_reference, route_ref]
  - term: ADS Intervention
    definition: >
      An event in which the Automated Driving System hands control back
      to a human (remote-assist or safety-driver) due to an inability to
      progress safely. Normalised per 1000 km of journey distance for
      cross-route comparability.
    relatedTerms: [ADS, hand-back]

sla:
  freshness:
    expected: P31D
    rule: DQ-FRESH-DVSA-APS-01
  availability:
    target: 99%

quality:
  rules:
    - id: DQ-FORMAT-ROUTE-REF-01
      dimension: format
      scope: column
      column: route_ref
      expression: 'rlike("^[A-Z]{2}-\\d{3}$")'
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-CMPL-ROUTE-REF-01
      dimension: completeness
      scope: column
      column: route_ref
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-RANGE-JOURNEYS-01
      dimension: accuracy
      scope: column
      column: journeys
      expression: "journeys >= 0 AND journeys <= 20000"
      threshold: 100
      blocksRelease: false
      severity: major
      owner: dvsa-domain-steward
    - id: DQ-RANGE-ONTIME-01
      dimension: accuracy
      scope: column
      column: on_time_pct
      expression: "on_time_pct >= 0.0 AND on_time_pct <= 100.0"
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-RANGE-INTERVENTIONS-01
      dimension: accuracy
      scope: column
      column: ads_interventions_per_1000km
      expression: "ads_interventions_per_1000km >= 0.0 AND ads_interventions_per_1000km <= 200.0"
      threshold: 100
      blocksRelease: false
      severity: major
      owner: dvsa-domain-steward
    - id: DQ-RANGE-SATISFACTION-01
      dimension: accuracy
      scope: column
      column: passenger_satisfaction
      expression: "passenger_satisfaction >= 1.0 AND passenger_satisfaction <= 5.0"
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-CMPL-OVERALL-01
      dimension: completeness
      scope: table
      expression: "row-level completeness >= 95"
      threshold: 95
      blocksRelease: true
      severity: major
      owner: dvsa-domain-steward
    - id: DQ-FRESH-DVSA-APS-01
      dimension: freshness
      scope: table
      threshold: 100
      blocksRelease: false
      severity: major
      owner: dvsa-domain-steward
    - id: DQ-VOL-DVSA-APS-01
      dimension: volume
      scope: table
      threshold: 100
      blocksRelease: false
      severity: minor
      owner: dvsa-domain-steward

termsOfUse:
  classification: OFFICIAL-SENSITIVE
  retention:
    period: P7Y
    deleteOn: expiry
  permittedUses:
    - statutory APS performance oversight by DVSA
    - operator service-quality benchmarking inside DfT
    - DQ gate evaluation
  prohibitedUses:
    - publication of identifiable per-operator on-time figures outside the public stats lane
    - commercial route-planning resale

access:
  rolesPermitted:
    - data-engineer (read+write on bronze)
    - data-analyst (read on silver+gold)
    - dvsa-domain-steward (read on bronze+silver+gold)
    - publicstats-consumer (read on aggregated release only)
  rolesProhibited:
    - everyone-else
    - police-consumer
    - insurer-consumer

endorsement:
  level: Promoted
  certifiedBy: DVSA APS Performance Data Product Owner
  certifiedAt: 2026-05-20

lineage:
  upstream:
    - kind: external
      system: AV-Ingest Operator Portal (Lane 5 — portal upload)
      object: portal://av-ingest/dvsa/aps-perf/DVSA-APS-PERF-YYYY-OPERATOR_performance_data.csv
  downstream:
    - kind: workspace_item
      workspace: AV-Medallion-{env}
      item: lh_av_silver.silver_aps_perf
    - kind: workspace_item
      workspace: AV-Medallion-{env}
      item: lh_av_gold.dim_aps_route
    - kind: workspace_item
      workspace: AV-Release-PublicStats-{env}
      item: publicstats_aps_service_quality

history:
  - version: 1.0.0
    date: 2026-05-20
    change: Initial Bronze contract derived from DVSA-APS-PERF-2025-FLEXIRIDE_performance_data.csv and synth-rules.md table 4.
    author: internal data engineering
    breaking: false
    approvers:
      - DVSA APS Performance Data Product Owner

customProperties:
  dft-av.owner-agency: DVSA
  dft-av.sensitivity: OFFICIAL-SENSITIVE
  dft-av.dt-reference: internal-dt-ref
  dft-av.hero-scenarios: []
  dft-av.pii-present: false
  dft-av.zone-of-trust: internal
  dft-av.volume.rows-per-day-expected: 1
  dft-av.volume.rows-per-day-tolerance-low-pct: 100
  dft-av.volume.rows-per-day-tolerance-high-pct: 1000
  dft-av.volume.rows-per-month-expected: 40
  dft-av.latency.end-to-end: P1D
  dft-av.source-csv-headers:
    - "Route Ref"
    - "Route Description"
    - "Journeys"
    - "On-Time Pct"
    - "ADS Interventions per 1000km"
    - "Passenger Satisfaction"
  dft-av.source-csv-sample: "[EXTERNAL] AV Data/AV_Act_Documents_Markup/DVSA-APS-PERF-2025-FLEXIRIDE_performance_data.csv"
  dft-av.hero_invariants: []
  dft-av.poison_classes_applicable:
    - schema-drift
    - range-violation
    - reference-integrity
  dft-av.release_zone_consumers:
    - publicstats_aps_service_quality
