apiVersion: opendatacontractstandard.org/v3
kind: DataContract

metadata:
  id: bronze-dvsa-permit-register
  name: Bronze DVSA APS Permit Register
  version: 1.0.0
  status: draft
  domain: dvsa
  tenant: dft-av
  owner:
    name: DVSA APS Permit Register Data Product Owner
    email: data.governance@dvsa.gov.uk
  description: >
    Bronze landing of the DVSA APS (Automated Passenger Service) permit
    register — one row per issued permit giving operator, local
    authority, region, the routes covered and status. Source is the
    DVSA Permits operational database pulled via a internal data lineage Data
    Pipeline (Lane 3 — pipeline) on a daily schedule. Feeds
    silver_permits, dim_aps_route, dim_location and the Licensing
    release product. Bound to internal-dt-ref in the DfT service-design
    data-asset register.

schema:
  type: delta
  location:
    layer: bronze
    workspace: AV-Medallion-{env}
    lakehouse: lh_av_bronze
    table: bronze_dvsa_permit_register
  columns:
    - name: permit_reference
      type: string
      nullable: false
      format: '^APS-PERMIT-\d{4}-\d{3}$'
      description: >
        DVSA-issued APS permit reference (PK). Year + 3-digit sequence.
        Source CSV header "Permit Reference".
    - name: nuico_name
      type: string
      nullable: false
      pii: PII.Party.LegalName
      description: >
        NUiCO operating under this permit. Joins to
        bronze_dvsa_fleet_audit.nuico_name in Silver. Source CSV header
        "NUiCO Name".
    - name: issue_date
      type: string
      nullable: false
      description: >
        British human-readable issue date (e.g. "12 August 2024"). Track
        D parses into a typed date at Silver. Source CSV header "Issue
        Date".
    - name: expiry_date
      type: string
      nullable: false
      description: >
        British human-readable expiry date — three years after issue per
        the seed pattern. Source CSV header "Expiry Date".
    - name: local_authority
      type: string
      nullable: false
      description: >
        UK local authority where the permit operates. Drawn from the
        closed 14-entry pool defined in synth-rules table 6. Source CSV
        header "Local Authority".
    - name: region
      type: string
      nullable: false
      enum: ["South West","South East","London","East of England","West Midlands","East Midlands","Yorkshire and The Humber","North West","North East","Scotland","Wales","Northern Ireland"]
      description: >
        UK ITL1 region. MUST be consistent with local_authority. Source
        CSV header "Region".
    - name: routes
      type: string
      nullable: false
      description: >
        Semicolon-separated list of 2–3 route refs (e.g. "FR-001; FR-002")
        covered by the permit. Silver explodes this into the
        permit↔route bridge. Source CSV header "Routes".
    - name: status
      type: string
      nullable: false
      enum: ["ACTIVE","SUSPENDED","REVOKED"]
      description: >
        Permit status. Closed vocabulary per synth-rules table 6. Source
        CSV header "Status".
    - name: _ingested_at_utc
      type: timestamp
      nullable: false
      description: Audit column — UTC timestamp when the row landed in Bronze.
    - name: _source_file
      type: string
      nullable: true
      description: Audit column — source CSV filename or URI.
    - name: _correlation_id
      type: string
      nullable: false
      description: Audit column — UUID linking the row to the pipeline run.
    - name: _dq_status
      type: string
      nullable: false
      enum: ["PASS","QUARANTINE","FAIL"]
      description: Audit column — DQ Gate verdict set by internal data lineage.
    - name: _source_lane
      type: string
      nullable: false
      enum: ["shortcut","mirroring","pipeline","push","portal","eventstream","openmirroring"]
      description: Audit column — internal ingest lane that delivered this row.
    - name: _raw_blob_path
      type: string
      nullable: false
      description: >
        Audit column — full ABFSS / S3 / queue URI of the raw payload as
        it landed in the source landing zone. Used for forensic replay
        and Purview lineage back to the raw blob. Supersedes the older
        _source_file audit column (kept for backward compatibility with
        ADR-002 v1 consumers); new ingest notebooks MUST set both to the
        same value when the source is file-shaped.
    - name: _contract_version
      type: string
      nullable: false
      format: '^\d+\.\d+\.\d+$'
      description: >
        Audit column — semver of the Bronze ODCS contract under which
        this row was written (matches metadata.version). Lets Silver and
        the DQ Gate detect contract drift without re-reading the YAML.

semantics:
  - term: APS Permit
    definition: >
      A DVSA-issued authorisation allowing a NUiCO to operate one or
      more Automated Passenger Service routes within a defined local
      authority area for a fixed duration (typically three years).
    relatedTerms: [permit_reference, NUiCO, route_ref]
  - term: ITL1 Region
    definition: >
      First-level International Territorial Level region used by the
      UK Office for National Statistics (the 12 regions replacing the
      former NUTS1 classification).
    relatedTerms: [local_authority, region]

sla:
  freshness:
    expected: PT24H
    rule: DQ-FRESH-DVSA-PERMIT-01
  availability:
    target: 99.5%

quality:
  rules:
    - id: DQ-FORMAT-PERMIT-REF-01
      dimension: format
      scope: column
      column: permit_reference
      expression: 'rlike("^APS-PERMIT-\\d{4}-\\d{3}$")'
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-UNIQ-PERMIT-REF-01
      dimension: uniqueness
      scope: table
      column: permit_reference
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-CMPL-PERMIT-REF-01
      dimension: completeness
      scope: column
      column: permit_reference
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-CMPL-NUICO-NAME-01
      dimension: completeness
      scope: column
      column: nuico_name
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-CONF-REGION-01
      dimension: conformity
      scope: column
      column: region
      expression: "region IN ('South West','South East','London','East of England','West Midlands','East Midlands','Yorkshire and The Humber','North West','North East','Scotland','Wales','Northern Ireland')"
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-CONF-STATUS-01
      dimension: conformity
      scope: column
      column: status
      expression: "status IN ('ACTIVE','SUSPENDED','REVOKED')"
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-FORMAT-ROUTES-01
      dimension: format
      scope: column
      column: routes
      expression: 'rlike(routes, "^[A-Z]{2}-\\d{3}(; [A-Z]{2}-\\d{3}){0,4}$")'
      threshold: 100
      blocksRelease: false
      severity: major
      owner: dvsa-domain-steward
    - id: DQ-CMPL-OVERALL-01
      dimension: completeness
      scope: table
      expression: "row-level completeness >= 95"
      threshold: 95
      blocksRelease: true
      severity: major
      owner: dvsa-domain-steward
    - id: DQ-FRESH-DVSA-PERMIT-01
      dimension: freshness
      scope: table
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: dvsa-domain-steward
    - id: DQ-VOL-DVSA-PERMIT-01
      dimension: volume
      scope: table
      threshold: 100
      blocksRelease: false
      severity: major
      owner: dvsa-domain-steward

termsOfUse:
  classification: OFFICIAL-SENSITIVE
  retention:
    period: P7Y
    deleteOn: expiry
  permittedUses:
    - statutory APS permit oversight by DVSA
    - cross-regulator service-area analysis
    - DQ gate evaluation
    - Licensing cross-check release product
  prohibitedUses:
    - commercial profiling of operators
    - PII enrichment outside the DfT consent envelope

access:
  rolesPermitted:
    - data-engineer (read+write on bronze)
    - data-analyst (read on silver+gold)
    - dvsa-domain-steward (read on bronze+silver+gold)
    - licensing-consumer (read on release_licensing)
  rolesProhibited:
    - everyone-else
    - police-consumer
    - insurer-consumer

endorsement:
  level: Promoted
  certifiedBy: DVSA APS Permit Register Data Product Owner
  certifiedAt: 2026-05-20

lineage:
  upstream:
    - kind: external
      system: DVSA Permits Operational DB (Lane 3 — Data Pipeline)
      object: azure-sql://sqldb-av-dvsa-prod/dbo.aps_permit_register
  downstream:
    - kind: workspace_item
      workspace: AV-Medallion-{env}
      item: lh_av_silver.silver_permits
    - kind: workspace_item
      workspace: AV-Medallion-{env}
      item: lh_av_gold.dim_aps_route
    - kind: workspace_item
      workspace: AV-Medallion-{env}
      item: lh_av_gold.dim_location
    - kind: workspace_item
      workspace: AV-Release-Licensing-{env}
      item: release_licensing_cross_check

history:
  - version: 1.0.0
    date: 2026-05-20
    change: Initial Bronze contract derived from DVSA-PERMIT-REGISTER-2026_aps_permit_register.csv and synth-rules.md table 6.
    author: internal data engineering
    breaking: false
    approvers:
      - DVSA APS Permit Register Data Product Owner

customProperties:
  dft-av.owner-agency: DVSA
  dft-av.sensitivity: OFFICIAL-SENSITIVE
  dft-av.dt-reference: internal-dt-ref
  dft-av.hero-scenarios: []
  dft-av.pii-present: true
  dft-av.zone-of-trust: internal
  dft-av.volume.rows-per-day-expected: 40
  dft-av.volume.rows-per-day-tolerance-low-pct: 50
  dft-av.volume.rows-per-day-tolerance-high-pct: 200
  dft-av.latency.end-to-end: PT4H
  dft-av.source-csv-headers:
    - "Permit Reference"
    - "NUiCO Name"
    - "Issue Date"
    - "Expiry Date"
    - "Local Authority"
    - "Region"
    - "Routes"
    - "Status"
  dft-av.source-csv-sample: "[EXTERNAL] AV Data/AV_Act_Documents_Markup/DVSA-PERMIT-REGISTER-2026_aps_permit_register.csv"
  dft-av.hero_invariants: []
  dft-av.poison_classes_applicable:
    - schema-drift
    - vocab-violation
    - duplicate-keys
    - format-violation
    - reference-integrity
  dft-av.release_zone_consumers:
    - release_licensing_cross_check
