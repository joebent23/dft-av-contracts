apiVersion: opendatacontractstandard.org/v3
kind: DataContract

metadata:
  id: bronze-ismr-occurrences
  name: Bronze NUiCO ISMR Annex 5 Occurrences
  version: 1.0.0
  status: draft
  domain: nuico
  tenant: dft-av
  owner:
    name: NUiCO ISMR Operator Reporting Data Product Owner
    email: data.governance@nuico.gov.uk
  description: >
    Bronze landing of the NUiCO In-Service Monitoring Return (ISMR)
    Annex 5 occurrences table — one row per (category, type, period)
    giving the count of safety occurrences and free-text notes. Source
    is the NUiCO regulatory return uploaded by operator compliance
    teams to the AV-Ingest portal (Lane 5 — portal upload). The notes
    column carries the hero identifiers SI-INV-2025-0001 (critical
    occurrences, emergency manoeuvres), VCA-REC-2025-NVR-001 (recalls)
    and R155-INC-NVR-2025-001 (cybersecurity issues) which underpin the
    an internal scenario and an internal scenario. Feeds silver_tx_occurrences,
    fact_parsed_evidence and the Insurers release product. Bound to
    internal-dt-ref in the DfT service-design data-asset
    register.

schema:
  type: delta
  location:
    layer: bronze
    workspace: AV-Medallion-{env}
    lakehouse: lh_av_bronze
    table: bronze_ismr_occurrences
  columns:
    - name: category
      type: string
      nullable: false
      enum: ["Short-term","Periodic","Safety Outcomes"]
      description: >
        Top-level ISMR occurrence category. Closed vocabulary per
        synth-rules table 7. Source CSV header "Category".
    - name: type
      type: string
      nullable: false
      description: >
        ISMR occurrence type within the category (e.g. "Critical
        occurrences", "ODD exceedances", "Cybersecurity issues"). Closed
        vocabulary of 19 values per synth-rules table 7; (category,
        type) pair preserved verbatim. Source CSV header "Type".
    - name: count
      type: integer
      nullable: false
      description: >
        Number of occurrences of this (category, type) in the reporting
        period. Realistic range 0–25. Source CSV header "Count".
    - name: period
      type: string
      nullable: false
      enum: ["2024","2025","2026","2026-H1"]
      description: >
        Reporting period the count covers. Source CSV header "Period".
    - name: notes
      type: string
      nullable: true
      description: >
        Free-text notes from the operator. CARRIES HERO IDS — preserved
        verbatim from source and never regenerated by synthesis (see
        synth-rules table 7 invariants). Source CSV header "Notes".
    - name: _ingested_at_utc
      type: timestamp
      nullable: false
      description: Audit column — UTC timestamp when the row landed in Bronze.
    - name: _source_file
      type: string
      nullable: true
      description: Audit column — source CSV filename or URI.
    - name: _correlation_id
      type: string
      nullable: false
      description: Audit column — UUID linking the row to the upload batch.
    - name: _dq_status
      type: string
      nullable: false
      enum: ["PASS","QUARANTINE","FAIL"]
      description: Audit column — DQ Gate verdict set by internal data lineage.
    - name: _source_lane
      type: string
      nullable: false
      enum: ["shortcut","mirroring","pipeline","push","portal","eventstream","openmirroring"]
      description: Audit column — internal ingest lane that delivered this row.
    - name: _raw_blob_path
      type: string
      nullable: false
      description: >
        Audit column — full ABFSS / S3 / queue URI of the raw payload as
        it landed in the source landing zone. Used for forensic replay
        and Purview lineage back to the raw blob. Supersedes the older
        _source_file audit column (kept for backward compatibility with
        ADR-002 v1 consumers); new ingest notebooks MUST set both to the
        same value when the source is file-shaped.
    - name: _contract_version
      type: string
      nullable: false
      format: '^\d+\.\d+\.\d+$'
      description: >
        Audit column — semver of the Bronze ODCS contract under which
        this row was written (matches metadata.version). Lets Silver and
        the DQ Gate detect contract drift without re-reading the YAML.

semantics:
  - term: ISMR
    definition: >
      In-Service Monitoring Return — the AV-Act-mandated return that
      every NUiCO must submit covering occurrences, safety outcomes
      and ODD compliance for their fleet over a defined period.
    relatedTerms: [Annex 5, occurrence, NUiCO]
  - term: Occurrence
    definition: >
      A single safety- or compliance-relevant event observed during AV
      operation (e.g. ODD exceedance, MRC failure, cybersecurity
      issue). Counted per (category, type, period).
    relatedTerms: [category, type, count]
  - term: MRC
    definition: >
      Minimum Risk Condition — the safe state an AV must achieve when
      it cannot continue self-driving (e.g. controlled stop in lane).
    relatedTerms: [ODD, fallback]

sla:
  freshness:
    expected: P92D
    rule: DQ-FRESH-ISMR-01
  availability:
    target: 99%

quality:
  rules:
    - id: DQ-CONF-CATEGORY-01
      dimension: conformity
      scope: column
      column: category
      expression: "category IN ('Short-term','Periodic','Safety Outcomes')"
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: nuico-domain-steward
    - id: DQ-CONF-PERIOD-01
      dimension: conformity
      scope: column
      column: period
      expression: "period IN ('2024','2025','2026','2026-H1')"
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: nuico-domain-steward
    - id: DQ-CMPL-TYPE-01
      dimension: completeness
      scope: column
      column: type
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: nuico-domain-steward
    - id: DQ-RANGE-COUNT-01
      dimension: accuracy
      scope: column
      column: count
      expression: "count >= 0 AND count <= 1000"
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: nuico-domain-steward
    - id: DQ-CONS-HERO-IDS-01
      dimension: consistency
      scope: table
      expression: >
        (SELECT COUNT(*) FROM bronze_ismr_occurrences WHERE notes LIKE '%SI-INV-2025-0001%') >= 2
        AND (SELECT COUNT(*) FROM bronze_ismr_occurrences WHERE notes LIKE '%VCA-REC-2025-NVR-001%') >= 1
        AND (SELECT COUNT(*) FROM bronze_ismr_occurrences WHERE notes LIKE '%R155-INC-NVR-2025-001%') >= 1
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: nuico-domain-steward
    - id: DQ-CMPL-OVERALL-01
      dimension: completeness
      scope: table
      expression: "row-level completeness >= 95"
      threshold: 95
      blocksRelease: true
      severity: major
      owner: nuico-domain-steward
    - id: DQ-FRESH-ISMR-01
      dimension: freshness
      scope: table
      threshold: 100
      blocksRelease: false
      severity: major
      owner: nuico-domain-steward
    - id: DQ-VOL-ISMR-01
      dimension: volume
      scope: table
      threshold: 100
      blocksRelease: false
      severity: minor
      owner: nuico-domain-steward

termsOfUse:
  classification: OFFICIAL-SENSITIVE
  retention:
    period: P7Y
    deleteOn: expiry
  permittedUses:
    - statutory in-service monitoring oversight by DVSA, CCAV and VCA
    - cross-regulator hero-gate evaluation (an internal scenario, an internal scenario, R155 cyber)
    - DQ gate evaluation
    - Insurers release dossier evidence pack
  prohibitedUses:
    - commercial profiling of operators
    - publication of identifiable per-operator safety figures outside the public stats lane
    - retransmission outside the DfT consent envelope

access:
  rolesPermitted:
    - data-engineer (read+write on bronze)
    - data-analyst (read on silver+gold)
    - nuico-domain-steward (read on bronze+silver+gold)
    - dvsa-domain-steward (read on silver+gold)
    - vca-domain-steward (read on silver+gold)
    - insurer-consumer (read on release_insurers)
  rolesProhibited:
    - everyone-else
    - publicstats-consumer

endorsement:
  level: Promoted
  certifiedBy: NUiCO ISMR Operator Reporting Data Product Owner
  certifiedAt: 2026-05-20

lineage:
  upstream:
    - kind: external
      system: AV-Ingest Operator Portal (Lane 5 — portal upload)
      object: portal://av-ingest/nuico/ismr/ISMR-ANNEX5-*_occurrences.csv
  downstream:
    - kind: workspace_item
      workspace: AV-Medallion-{env}
      item: lh_av_silver.silver_tx_occurrences
    - kind: workspace_item
      workspace: AV-Medallion-{env}
      item: lh_av_gold.fact_parsed_evidence
    - kind: workspace_item
      workspace: AV-Release-Insurers-{env}
      item: insurer_evidence_pack

history:
  - version: 1.0.0
    date: 2026-05-20
    change: Initial Bronze contract derived from ISMR-ANNEX5-NVR-2025-001_occurrences.csv and synth-rules.md table 7.
    author: internal data engineering
    breaking: false
    approvers:
      - NUiCO ISMR Operator Reporting Data Product Owner
      - Insurers release Data Product Owner

customProperties:
  dft-av.owner-agency: NUiCO
  dft-av.sensitivity: OFFICIAL-SENSITIVE
  dft-av.dt-reference: internal-dt-ref
  dft-av.hero-scenarios:
    - internal-scenario-1
    - internal-scenario-2
    - internal-scenario-3
  dft-av.pii-present: false
  dft-av.zone-of-trust: internal
  dft-av.volume.rows-per-day-expected: 1
  dft-av.volume.rows-per-day-tolerance-low-pct: 100
  dft-av.volume.rows-per-day-tolerance-high-pct: 1000
  dft-av.volume.rows-per-period-expected: 19
  dft-av.latency.end-to-end: P1D
  dft-av.source-csv-headers:
    - "Category"
    - "Type"
    - "Count"
    - "Period"
    - "Notes"
  dft-av.source-csv-sample: "[EXTERNAL] AV Data/AV_Act_Documents_Markup/ISMR-ANNEX5-NVR-2025-001_occurrences.csv"
  dft-av.hero_invariants:
    - "notes LIKE '%SI-INV-2025-0001%' MUST occur at least twice (Critical occurrences, Emergency manoeuvres)"
    - "notes LIKE '%VCA-REC-2025-NVR-001%' MUST occur at least once (Recalls / software updates)"
    - "notes LIKE '%R155-INC-NVR-2025-001%' MUST occur at least once (Cybersecurity issues)"
    - "notes referencing 'v2.1.0' and 'v2.2.0' MUST each occur at least once"
  dft-av.poison_classes_applicable:
    - schema-drift
    - vocab-violation
    - hero-mutation
    - free-text-overwrite
  dft-av.release_zone_consumers:
    - insurer_evidence_pack
