apiVersion: opendatacontractstandard.org/v3
kind: DataContract

metadata:
  id: bronze-ccav-kpi
  name: Bronze CCAV Regulatory KPI
  version: 1.0.0
  status: draft
  domain: ccav
  tenant: dft-av
  owner:
    name: CCAV Regulatory Analytics Data Product Owner
    email: data.governance@ccav.gov.uk
  description: >
    Bronze landing of the quarterly CCAV regulatory-process KPI summary
    (transaction count per AV Act process and the Data Tracker references
    observed). Source is the analyst-published quarterly CSV uploaded by
    CCAV staff to the AV-Ingest portal (Lane 5 — portal upload). One row
    per (quarter, process). Underpins the M2 cross-regulator workload-mix
    dashboard and feeds silver_ccav_kpi / fact_transaction process
    weights. Bound to internal-dt-ref–internal-dt-ref (whole AV Act process taxonomy) in the
    DfT service-design data-asset register.

schema:
  type: delta
  location:
    layer: bronze
    workspace: AV-Medallion-{env}
    lakehouse: lh_av_bronze
    table: bronze_ccav_kpi
  columns:
    - name: process
      type: string
      nullable: false
      enum: ["Registration","In Use Regulation","Approval","Operator Licensing","Authorisation","Incident Investigation"]
      description: >
        AV Act regulatory process the KPI summarises. Closed vocabulary of
        six values per analyst synth-rules (table 1). Source CSV header
        "Process".
    - name: transaction_count
      type: integer
      nullable: false
      description: >
        Count of regulatory transactions of this process type in the
        reporting period. Realistic range 1–500 per process per quarter.
        Source CSV header "Transaction Count".
    - name: pct_of_total
      type: decimal(4,1)
      nullable: false
      description: >
        Share of the period's total transactions attributable to this
        process, rounded to one decimal place. All rows in a period MUST
        sum to 100.0 ± 0.5. Source CSV header "Pct of Total".
    - name: key_dt_references
      type: string
      nullable: false
      description: >
        Comma-separated list of Data Tracker DT references the analyst
        associates with this process (e.g. "internal-dt-ref"
        for Registration). Preserved verbatim from source. Source CSV
        header "Key DT References".
    - name: _ingested_at_utc
      type: timestamp
      nullable: false
      description: Audit column — UTC timestamp when the row landed in Bronze.
    - name: _source_file
      type: string
      nullable: true
      description: Audit column — source CSV filename or URI.
    - name: _correlation_id
      type: string
      nullable: false
      description: Audit column — UUID linking the row to the ingest batch / API call.
    - name: _dq_status
      type: string
      nullable: false
      enum: ["PASS","QUARANTINE","FAIL"]
      description: Audit column — DQ Gate verdict set by internal data lineage.
    - name: _source_lane
      type: string
      nullable: false
      enum: ["shortcut","mirroring","pipeline","push","portal","eventstream","openmirroring"]
      description: Audit column — internal ingest lane that delivered this row.
    - name: _raw_blob_path
      type: string
      nullable: false
      description: >
        Audit column — full ABFSS / S3 / queue URI of the raw payload as
        it landed in the source landing zone. Used for forensic replay
        and Purview lineage back to the raw blob. Supersedes the older
        _source_file audit column (kept for backward compatibility with
        ADR-002 v1 consumers); new ingest notebooks MUST set both to the
        same value when the source is file-shaped.
    - name: _contract_version
      type: string
      nullable: false
      format: '^\d+\.\d+\.\d+$'
      description: >
        Audit column — semver of the Bronze ODCS contract under which
        this row was written (matches metadata.version). Lets Silver and
        the DQ Gate detect contract drift without re-reading the YAML.

semantics:
  - term: Regulatory Process
    definition: >
      A named class of AV Act activity (Registration, Approval, In Use
      Regulation, Operator Licensing, Authorisation, Incident
      Investigation) under which one or more DT-numbered transactions
      occur.
    relatedTerms: [DT_reference, transaction]
  - term: Quarterly KPI Period
    definition: >
      A calendar quarter (e.g. 2025-Q3) over which CCAV aggregates the
      number of regulatory transactions per process. Grain of this table.
    relatedTerms: [quarter, transaction_count]

sla:
  freshness:
    expected: P92D
    rule: DQ-FRESH-CCAV-KPI-01
  availability:
    target: 99%

quality:
  rules:
    - id: DQ-CONF-CCAV-PROCESS-01
      dimension: conformity
      scope: column
      column: process
      expression: "process IN ('Registration','In Use Regulation','Approval','Operator Licensing','Authorisation','Incident Investigation')"
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: ccav-domain-steward
    - id: DQ-CMPL-CCAV-PROCESS-01
      dimension: completeness
      scope: column
      column: process
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: ccav-domain-steward
    - id: DQ-RANGE-TX-COUNT-01
      dimension: accuracy
      scope: column
      column: transaction_count
      expression: "transaction_count >= 0 AND transaction_count <= 1000"
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: ccav-domain-steward
    - id: DQ-RANGE-PCT-TOTAL-01
      dimension: accuracy
      scope: column
      column: pct_of_total
      expression: "pct_of_total >= 0.0 AND pct_of_total <= 100.0"
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: ccav-domain-steward
    - id: DQ-CONS-PCT-SUM-01
      dimension: consistency
      scope: table
      expression: "SUM(pct_of_total) BETWEEN 99.5 AND 100.5 per ingest batch"
      threshold: 100
      blocksRelease: true
      severity: critical
      owner: ccav-domain-steward
    - id: DQ-CMPL-OVERALL-01
      dimension: completeness
      scope: table
      expression: "row-level completeness >= 95"
      threshold: 95
      blocksRelease: true
      severity: major
      owner: ccav-domain-steward
    - id: DQ-FRESH-CCAV-KPI-01
      dimension: freshness
      scope: table
      threshold: 100
      blocksRelease: false
      severity: major
      owner: ccav-domain-steward
    - id: DQ-VOL-CCAV-KPI-01
      dimension: volume
      scope: table
      threshold: 100
      blocksRelease: false
      severity: minor
      owner: ccav-domain-steward

termsOfUse:
  classification: OFFICIAL-SENSITIVE
  retention:
    period: P7Y
    deleteOn: expiry
  permittedUses:
    - statutory regulatory oversight by CCAV
    - cross-regulator workload-mix analysis
    - DQ gate evaluation
  prohibitedUses:
    - commercial profiling of operators
    - PII enrichment outside the DfT consent envelope
    - publication of identifiable per-process figures outside the public stats lane

access:
  rolesPermitted:
    - data-engineer (read+write on bronze)
    - data-analyst (read on silver+gold)
    - ccav-domain-steward (read on bronze+silver+gold)
  rolesProhibited:
    - everyone-else
    - police-consumer
    - insurer-consumer

endorsement:
  level: Promoted
  certifiedBy: CCAV Data Product Owner
  certifiedAt: 2026-05-20

lineage:
  upstream:
    - kind: external
      system: CCAV Regulatory Portal (Lane 5 — portal upload)
      object: portal://av-ingest/ccav/kpi/CCAV-KPI-YYYY-QN_kpi_data.csv
  downstream:
    - kind: workspace_item
      workspace: AV-Medallion-{env}
      item: lh_av_silver.silver_ccav_kpi
    - kind: workspace_item
      workspace: AV-Medallion-{env}
      item: lh_av_gold.fact_transaction
    - kind: workspace_item
      workspace: AV-Release-PublicStats-{env}
      item: publicstats_regulatory_workload_mix

history:
  - version: 1.0.0
    date: 2026-05-20
    change: Initial Bronze contract derived from CCAV-KPI-2025-Q3_kpi_data.csv and synth-rules.md table 1.
    author: internal data engineering
    breaking: false
    approvers:
      - CCAV Regulatory Analytics Data Product Owner

# Phase-2 ingest routing block. Drives codegen of RouteMeta, JSON Schema, and
# APIM ingest-API operation Bicep. Consumed by both dft-av-platform (APIM/
# Functions) and dft-av-cockpit (upload proxy). See ADR-0003.
routing:
  doctype_slug: nuico-ccav-kpi
  lane: 5
  apim_api: ingest
  apim_route: /ccav/kpi-quarterly
  http_method: POST
  required_personas:
    - ccav_analyst
  required_headers:
    - x-correlation-id
    - x-contract-version
  publishes_event: true
  event:
    type: dft.av.nuico-ccav-kpi.ingested.v1
    subject_template: "ccavKpi/{quarter}"
    grid_topic_name: dft-av-egt-{env}

customProperties:
  dft-av.owner-agency: CCAV
  dft-av.sensitivity: OFFICIAL-SENSITIVE
  dft-av.dt-reference: internal-dt-ref-internal-dt-ref
  dft-av.hero-scenarios: []
  dft-av.pii-present: false
  dft-av.zone-of-trust: internal
  dft-av.volume.rows-per-day-expected: 0
  dft-av.volume.rows-per-day-tolerance-low-pct: 0
  dft-av.volume.rows-per-day-tolerance-high-pct: 0
  dft-av.volume.rows-per-quarter-expected: 6
  dft-av.latency.end-to-end: P1D
  dft-av.source-csv-headers:
    - "Process"
    - "Transaction Count"
    - "Pct of Total"
    - "Key DT References"
  dft-av.source-csv-sample: "[EXTERNAL] AV Data/AV_Act_Documents_Markup/CCAV-KPI-2025-Q3_kpi_data.csv"
  dft-av.hero_invariants: []
  dft-av.poison_classes_applicable:
    - schema-drift
    - vocab-violation
    - aggregate-drift
  dft-av.release_zone_consumers:
    - publicstats_regulatory_workload_mix
